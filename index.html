<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetGraph - لوحة تحكم الشبكة</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Tahoma', sans-serif; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; color: #58a6ff; }
  #clock { font-size: 13px; color: #8b949e; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; }
  .stat-card { background: #21262d; border-radius: 8px; padding: 15px; text-align: center; border: 1px solid #30363d; }
  .stat-card h3 { font-size: 28px; margin-bottom: 5px; }
  .stat-card p { font-size: 12px; color: #8b949e; }
  .online { color: #3fb950; } .offline { color: #f85149; } .warning { color: #d29922; } .total { color: #58a6ff; }
  .controls { padding: 0 15px; display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
  .btn.active { background: #1f6feb; color: white; }
  .search-box { flex: 1; min-width: 150px; padding: 6px 12px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9; }
  #graph { width: 100%; height: 300px; background: #0d1117; }
  .device-list { padding: 15px; }
  .device-item { display: flex; justify-content: space-between; padding: 10px; background: #161b22; margin-bottom: 6px; border-radius: 6px; border-right: 3px solid; }
  .device-item.online { border-right-color: #3fb950; }
  .device-item.offline { border-right-color: #f85149; }
  .alert-box { position: fixed; top: 60px; left: 20px; background: #f85149; color: white; padding: 12px 20px; border-radius: 8px; display: none; z-index: 1000; animation: slideIn 0.3s; }
  @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .footer { text-align: center; padding: 10px; color: #8b949e; font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>🌐 NetGraph - لوحة تحكم الشبكة</h1>
  <div id="clock">--:--:--</div>
</header>

<div class="stats">
  <div class="stat-card"><h3 class="offline" id="offline-count">0</h3><p>غير متصل</p></div>
  <div class="stat-card"><h3 class="warning" id="warning-count">0</h3><p>تحذير</p></div>
  <div class="stat-card"><h3 class="online" id="online-count">0</h3><p>متصل</p></div>
  <div class="stat-card"><h3 class="total" id="total-count">0</h3><p>إجمالي الأجهزة</p></div>
</div>

<div class="controls">
  <button class="btn active" onclick="filterDevices('all')">الكل</button>
  <button class="btn" onclick="filterDevices('online')">متصل</button>
  <button class="btn" onclick="filterDevices('offline')">غير متصل</button>
  <button class="btn" onclick="filterDevices('warning')">تحذير</button>
  <input type="text" class="search-box" id="searchInput" placeholder="ابحث عن جهاز..." onkeyup="searchDevices()">
</div>

<canvas id="graph"></canvas>

<div class="device-list" id="device-list"></div>

<div class="alert-box" id="alert-box">
  ⚠️ <span id="alert-message"></span>
</div>

<div class="footer">
  🔄 تحديث تلقائي كل <span id="refresh-interval">3</span> ثوانٍ | آخر تحديث: <span id="last-update">--</span>
</div>

<script>
let devices = [];
let previousStatus = {};

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ar-SA');
}
setInterval(updateClock, 1000);
updateClock();

function showAlert(message) {
  const box = document.getElementById('alert-box');
  document.getElementById('alert-message').textContent = message;
  box.style.display = 'block';
  setTimeout(() => box.style.display = 'none', 5000);
}

function loadDevices() {
  fetch('devices-data.json')
    .then(r => r.json())
    .then(data => {
      const prev = {...previousStatus};
      data.forEach(d => {
        if (prev[d.id] && prev[d.id] === 'online' && d.status === 'offline') {
          showAlert(`🔴 ${d.name} فصل عن الشبكة!`);
        }
        previousStatus[d.id] = d.status;
      });
      devices = data;
      render();
      document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ar-SA');
    })
    .catch(() => {
      devices = [
        {id:1, name:'راوتر 1', status:'online', ip:'192.168.1.1', type:'router'},
        {id:2, name:'كاميرا 1', status:'online', ip:'192.168.1.101', type:'camera'},
        {id:3, name:'كاميرا 2', status:'online', ip:'192.168.1.102', type:'camera'},
        {id:4, name:'راوتر 2', status:'online', ip:'192.168.1.2', type:'router'},
        {id:5, name:'راوتر 3', status:'online', ip:'192.168.1.3', type:'router'},
        {id:6, name:'نقطة وصول WiFi', status:'online', ip:'192.168.1.10', type:'ap'},
        {id:7, name:'طابعة', status:'offline', ip:'192.168.1.50', type:'printer'},
        {id:8, name:'سيرفر احتياطي', status:'online', ip:'192.168.1.200', type:'server'},
        {id:9, name:'السيرفر الرئيسي', status:'online', ip:'192.168.1.201', type:'server'},
        {id:10, name:'جهاز غير معروف', status:'warning', ip:'192.168.1.99', type:'unknown'}
      ];
      render();
    });
}

function render() {
  const online = devices.filter(d => d.status === 'online').length;
  const offline = devices.filter(d => d.status === 'offline').length;
  const warning = devices.filter(d => d.status === 'warning').length;
  
  document.getElementById('online-count').textContent = online;
  document.getElementById('offline-count').textContent = offline;
  document.getElementById('warning-count').textContent = warning;
  document.getElementById('total-count').textContent = devices.length;

  drawGraph();
  renderList();
}

function drawGraph() {
  const canvas = document.getElementById('graph');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = 300;
  
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const radius = Math.min(centerX, centerY) - 50;
  
  ctx.beginPath();
  ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
  ctx.fillStyle = '#58a6ff';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '10px Tahoma';
  ctx.textAlign = 'center';
  ctx.fillText('السيرفر', centerX, centerY + 35);
  
  const angleStep = (Math.PI * 2) / devices.length;
  devices.forEach((device, i) => {
    const angle = i * angleStep - Math.PI / 2;
    const x = centerX + Math.cos(angle) * radius;
    const y = centerY + Math.sin(angle) * radius;
    
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(x, y);
    ctx.strokeStyle = device.status === 'online' ? '#3fb950' : device.status === 'warning' ? '#d29922' : '#f85149';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.beginPath();
    ctx.arc(x, y, 15, 0, Math.PI * 2);
    ctx.fillStyle = device.status === 'online' ? '#3fb950' : device.status === 'warning' ? '#d29922' : '#f85149';
    ctx.fill();
    
    ctx.fillStyle = '#c9d1d9';
    ctx.font = '9px Tahoma';
    ctx.fillText(device.name, x, y + 28);
  });
}

let currentFilter = 'all';
function filterDevices(type) {
  currentFilter = type;
  document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderList();
}

function searchDevices() {
  renderList();
}

function renderList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('device-list');
  list.innerHTML = '';
  
  devices.filter(d => {
    if (currentFilter !== 'all' && d.status !== currentFilter) return false;
    if (search && !d.name.toLowerCase().includes(search) && !d.ip.includes(search)) return false;
    return true;
  }).forEach(d => {
    const div = document.createElement('div');
    div.className = `device-item ${d.status}`;
    const statusText = d.status === 'online' ? '🟢 متصل' : d.status === 'warning' ? '🟡 تحذير' : '🔴 غير متصل';
    div.innerHTML = `<span>${d.name} (${d.ip})</span><span>${statusText}</span>`;
    list.appendChild(div);
  });
}

setInterval(loadDevices, 3000);
loadDevices();
</script>
</body>
</html>
