<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شبكة الأجهزة المتصلة - تحديث لحظي</title>
<style>
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Tahoma', sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
  }
  h1 { font-size: 22px; margin-bottom: 5px; }
  p.sub { color: #8b949e; margin-top: 0; font-size: 14px; }
  #graph {
    width: 100%;
    max-width: 700px;
    height: 480px;
    margin: 20px auto;
    background: #161b22;
    border-radius: 12px;
    border: 1px solid #30363d;
  }
  .node circle { stroke-width: 3px; cursor: pointer; transition: stroke 0.4s ease, fill 0.4s ease; }
  .node text { fill: #e6edf3; font-size: 11px; text-anchor: middle; pointer-events: none; }
  .link { stroke: #3fb950; stroke-width: 2px; opacity: 0.6; transition: stroke 0.4s ease; }
  .link.offline { stroke: #6e7681; opacity: 0.2; }
  #info { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; max-width: 700px; margin: 0 auto 10px; font-size: 14px; min-height: 20px; }
  #status-bar { font-size: 13px; color: #3fb950; margin-bottom: 10px; }
  #legend { font-size: 12px; color: #8b949e; margin-top: 8px; }
  #legend span { margin: 0 10px; }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-left:4px; vertical-align:middle; }
</style>
</head>
<body>
  <h1>🟢 شبكة الأجهزة المتصلة</h1>
  <p class="sub">الأجهزة تتحدث حالتها كل 3 ثوان بدون إعادة تحميل</p>
  <div id="status-bar">⏳ بانتظار أول تحديث...</div>
  <div id="info">اضغط على أي جهاز لمعرفة تفاصيله</div>
  <svg id="graph"></svg>
  <div id="legend">
    <span><span class="dot" style="background:#3fb950"></span>متصل</span>
    <span><span class="dot" style="background:#6e7681"></span>غير متصل</span>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script>
    const data = {
      nodes: [
        { id: "السيرفر الرئيسي", type: "server", status: "online" },
        { id: "راوتر 1", type: "router", status: "online" },
        { id: "راوتر 2", type: "router", status: "online" },
        { id: "كاميرا 1", type: "camera", status: "online" },
        { id: "كاميرا 2", type: "camera", status: "online" },
        { id: "نقطة وصول WiFi", type: "access_point", status: "online" },
        { id: "طابعة", type: "printer", status: "online" }
      ],
      links: [
        { source: "السيرفر الرئيسي", target: "راوتر 1" },
        { source: "السيرفر الرئيسي", target: "راوتر 2" },
        { source: "راوتر 1", target: "كاميرا 1" },
        { source: "راوتر 1", target: "كاميرا 2" },
        { source: "راوتر 2", target: "نقطة وصول WiFi" },
        { source: "نقطة وصول WiFi", target: "طابعة" }
      ]
    };
    const svg = d3.select("#graph");
    const width = svg.node().clientWidth;
    const height = svg.node().clientHeight;
    const simulation = d3.forceSimulation(data.nodes)
      .force("link", d3.forceLink(data.links).id(d => d.id).distance(130))
      .force("charge", d3.forceManyBody().strength(-350))
      .force("center", d3.forceCenter(width / 2, height / 2));
    const link = svg.append("g").selectAll("line").data(data.links).join("line").attr("class", "link");
    const node = svg.append("g").selectAll("g").data(data.nodes).join("g").attr("class", "node")
      .call(d3.drag()
        .on("start", (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
        .on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; })
        .on("end", (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));
    node.append("circle").attr("r", 20).attr("fill", "#3fb950").attr("stroke", "#0d1117");
    node.append("text").attr("dy", -28).text(d => d.id);
    node.on("click", (e,d) => {
      document.getElementById("info").innerText = "📟 " + d.id + " | " + d.type + " | " + (d.status==="online"?"متصل 🟢":"غير متصل ⚪");
    });
    simulation.on("tick", () => {
      link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      node.attr("transform", d=>`translate(${d.x},${d.y})`);
    });
    function refreshStatus() {
      const r = data.nodes[Math.floor(Math.random()*data.nodes.length)];
      r.status = r.status==="online"?"offline":"online";
      node.select("circle").attr("fill", d=>d.status==="online"?"#3fb950":"#6e7681");
      link.attr("class", d=>"link"+(d.source.status==="offline"||d.target.status==="offline"?" offline":""));
      document.getElementById("status-bar").innerText = "🔄 " + new Date().toLocaleTimeString("ar-SA") + " — تغيّرت حالة: " + r.id;
    }
    setInterval(refreshStatus, 3000);
  </script>
</body>
</html>
